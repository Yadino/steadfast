services:
  db:
    image: pgvector/pgvector:pg16
    container_name: steadfast-db
    environment:
      POSTGRES_USER: steadfast
      POSTGRES_PASSWORD: steadfast
      POSTGRES_DB: steadfast
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steadfast -d steadfast"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build: .
    container_name: steadfast-api
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://steadfast:steadfast@db:5432/steadfast
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - fastembed_cache:/root/.cache

volumes:
  pgdata:
  fastembed_cache:
