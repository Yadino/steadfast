<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Steadfast Triage</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AB%3C/text%3E%3C/svg%3E"/>
  <style>
    :root {
      color-scheme: light dark;

      --bg:        #f6f7fb;
      --panel:     #ffffff;
      --panel-2:   #fafbfd;
      --ink:       #161821;
      --ink-soft:  #4a5160;
      --muted:     #8b91a1;
      --line:      #e6e8f0;
      --line-2:    #eef0f6;
      --accent:    #4f46e5;
      --accent-soft: #eef0ff;

      --pri-low:      #5b6473;
      --pri-medium:   #2563eb;
      --pri-high:     #d97706;
      --pri-critical: #dc2626;

      --mode-answer:  #16a34a;
      --mode-check:   #d97706;
      --mode-none:    #6b7280;

      --shadow: 0 1px 2px rgba(20,23,40,0.04), 0 8px 24px rgba(20,23,40,0.06);
      --radius: 14px;
      --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #0f1115;
        --panel:     #161922;
        --panel-2:   #1b1f2a;
        --ink:       #e7e9ef;
        --ink-soft:  #b9bdca;
        --muted:     #7a8092;
        --line:      #252a36;
        --line-2:    #2c3140;
        --accent:    #818cf8;
        --accent-soft: #232742;

        --pri-low:      #9aa1b1;
        --pri-medium:   #60a5fa;
        --pri-high:     #fbbf24;
        --pri-critical: #f87171;

        --mode-answer:  #34d399;
        --mode-check:   #fbbf24;
        --mode-none:    #9ca3af;

        --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 12px 28px rgba(0,0,0,0.35);
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
            Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }

    header.app {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; margin-bottom: 18px;
    }
    header.app h1 {
      font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin: 0;
    }
    header.app .sub { color: var(--muted); font-size: 13px; }

    .controls {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow);
      display: grid; grid-template-columns: 1fr auto auto auto auto; gap: 12px;
      align-items: end;
    }
    .controls .field { display: flex; flex-direction: column; gap: 6px; }
    .controls label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); font-weight: 600;
    }
    .controls select, .controls input[type=number] {
      font: inherit; padding: 8px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
      min-width: 0;
    }
    .controls select { min-width: 280px; }
    .controls input[type=number] { width: 90px; text-align: right; }
    .controls .check {
      display: flex; align-items: center; gap: 8px; height: 38px;
      padding: 0 10px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: var(--panel-2); user-select: none; cursor: pointer;
      font-weight: 600; font-size: 13px; color: var(--ink-soft);
    }
    .controls .check input { accent-color: var(--accent); }
    .controls button {
      font: inherit; font-weight: 600;
      background: var(--accent); color: white; border: 0;
      border-radius: var(--radius-sm); padding: 9px 18px; cursor: pointer;
      transition: filter 0.15s;
    }
    .controls button:hover { filter: brightness(1.06); }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }

    .scorebar {
      display: none;
      margin: 14px 0 4px;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 12px 18px;
      grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .scorebar.on { display: grid; }
    .scorebar .metric {
      display: flex; flex-direction: column; gap: 3px;
      padding: 6px 12px; border-right: 1px solid var(--line-2);
    }
    .scorebar .metric:last-child { border-right: 0; }
    .scorebar .m-label {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); font-weight: 700;
    }
    .scorebar .m-value {
      font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em; color: var(--ink);
    }
    .scorebar .m-sub {
      font-size: 11.5px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .scorebar .m-value.good { color: var(--mode-answer); }
    .scorebar .m-value.ok   { color: var(--pri-high); }
    .scorebar .m-value.bad  { color: var(--pri-critical); }

    .mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%;
      font-size: 11px; font-weight: 700; line-height: 1;
      margin-left: 4px;
    }
    .mark.ok  { background: var(--mode-answer); color: #fff; }
    .mark.bad { background: var(--pri-critical); color: #fff; }

    .judge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11.5px; font-weight: 700; padding: 3px 9px;
      border-radius: 999px; background: var(--accent-soft);
      color: var(--ink-soft); font-variant-numeric: tabular-nums;
    }
    .judge.good { color: var(--mode-answer); }
    .judge.ok   { color: var(--pri-high); }
    .judge.bad  { color: var(--pri-critical); }

    .status-bar {
      display: flex; align-items: center; gap: 14px;
      margin: 16px 2px 4px; min-height: 22px; color: var(--muted); font-size: 13px;
    }
    .status-bar a {
      color: var(--accent); font-weight: 600; text-decoration: none;
    }
    .status-bar a:hover { text-decoration: underline; }
    .status-bar .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
    }
    .status-bar.running .dot {
      background: var(--accent); animation: pulse 1.2s ease-in-out infinite;
    }
    .status-bar.done .dot { background: var(--mode-answer); }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }

    .results { display: flex; flex-direction: column; gap: 16px; margin-top: 12px; }

    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); box-shadow: var(--shadow);
      overflow: hidden;
      animation: cardin 0.25s ease-out;
    }
    @keyframes cardin {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 14px 18px;
      border-bottom: 1px solid var(--line-2);
      background: var(--panel-2);
    }
    .card-id { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .card-id .id { font-weight: 700; letter-spacing: -0.005em; }
    .card-id .who { color: var(--muted); font-size: 12.5px; }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .elapsed {
      display: inline-flex; align-items: center; gap: 4px;
      font-variant-numeric: tabular-nums; color: var(--ink-soft);
      font-weight: 600; font-size: 12.5px;
      padding: 4px 8px; border-radius: 999px;
      background: var(--accent-soft);
    }

    .pill {
      display: inline-block; padding: 3px 9px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: var(--line-2); color: var(--ink-soft);
      border: 1px solid var(--line);
    }
    .pill[data-pri=low]      { color: var(--pri-low); }
    .pill[data-pri=medium]   { color: var(--pri-medium); }
    .pill[data-pri=high]     { color: var(--pri-high); }
    .pill[data-pri=critical] { color: var(--pri-critical); }
    .pill[data-mode=answer_found]      { color: var(--mode-answer); }
    .pill[data-mode=needs_human_check] { color: var(--mode-check); }
    .pill[data-mode=no_relevant_answer]{ color: var(--mode-none); }

    .email { padding: 4px 18px 0; }
    .email-block { padding: 14px 0; border-bottom: 1px dashed var(--line-2); }
    .email-block:last-child { border-bottom: 0; }
    .email-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); font-weight: 700; margin-bottom: 6px;
    }
    .email-label .conf {
      color: var(--ink-soft); font-weight: 600;
      text-transform: none; letter-spacing: 0; font-size: 11.5px;
      padding: 1px 7px; background: var(--line-2);
      border-radius: 999px;
    }
    .email-subject {
      font-weight: 600; font-size: 14.5px; color: var(--ink);
      margin-bottom: 6px;
    }
    .email-body {
      color: var(--ink); white-space: pre-wrap; word-wrap: break-word;
      font-size: 13.5px; line-height: 1.55;
    }
    .email-block.response { background: linear-gradient(180deg, transparent, var(--accent-soft) 200%); }

    .flags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .flag {
      font-size: 11px; padding: 2px 7px; border-radius: 6px;
      background: var(--line-2); color: var(--ink-soft);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    details.internals {
      border-top: 1px solid var(--line-2);
      background: var(--panel-2);
    }
    details.internals > summary {
      list-style: none; cursor: pointer; user-select: none;
      padding: 10px 18px; font-size: 12px; color: var(--muted);
      font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
    }
    details.internals > summary::-webkit-details-marker { display: none; }
    details.internals > summary::before {
      content: "▸"; transition: transform 0.15s; display: inline-block;
    }
    details.internals[open] > summary::before { transform: rotate(90deg); }

    .internals-body { padding: 6px 18px 18px; }
    .kv { display: grid; grid-template-columns: 200px 1fr; gap: 12px; padding: 4px 0; }
    .kv .k { color: var(--muted); font-size: 12px; }
    .kv .v { color: var(--ink-soft); font-size: 13px; word-break: break-word; }
    .kv .v.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px;
    }

    .chunks { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .chunk {
      border: 1px solid var(--line-2); border-radius: var(--radius-sm);
      background: var(--panel); overflow: hidden;
    }
    .chunk > summary {
      list-style: none; cursor: pointer; user-select: none;
      display: grid;
      grid-template-columns: minmax(70px, auto) minmax(80px, auto) minmax(60px, auto) 1fr auto;
      gap: 10px; align-items: center;
      padding: 8px 12px; font-size: 12.5px;
    }
    .chunk > summary::-webkit-details-marker { display: none; }
    .chunk > summary::before {
      content: "▸"; color: var(--muted);
      transition: transform 0.15s; display: inline-block; margin-right: -4px;
    }
    .chunk[open] > summary::before { transform: rotate(90deg); }
    .chunk .c-id  {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--ink); font-weight: 600;
    }
    .chunk .c-cat, .chunk .c-pri {
      font-size: 11px; color: var(--ink-soft);
    }
    .chunk .c-subject {
      color: var(--ink); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .chunk .c-score {
      font-variant-numeric: tabular-nums; color: var(--ink-soft);
      font-size: 12px; padding: 2px 7px; border-radius: 999px;
      background: var(--accent-soft);
    }
    .chunk-body {
      padding: 6px 12px 12px; border-top: 1px solid var(--line-2);
      background: var(--panel-2);
      display: flex; flex-direction: column; gap: 8px;
    }
    .chunk-body .c-label {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); font-weight: 700; margin-top: 4px;
    }
    .chunk-body .c-subject-full {
      font-weight: 600; font-size: 13.5px; color: var(--ink);
    }
    .chunk-body .c-text {
      color: var(--ink); white-space: pre-wrap; word-wrap: break-word;
      font-size: 13px; line-height: 1.5;
    }

    .card.error { border-color: var(--pri-critical); }
    .card.error .email-block { color: var(--pri-critical); }

    .empty {
      text-align: center; color: var(--muted); padding: 60px 0;
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .controls { grid-template-columns: 1fr; }
      .controls select, .controls input[type=number] { width: 100%; min-width: 0; }
      .kv { grid-template-columns: 1fr; gap: 2px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="app">
      <div>
        <h1>Steadfast Triage</h1>
        <div class="sub">Pick a dataset, run the pipeline, inspect each reply as it arrives.</div>
      </div>
    </header>

    <section class="controls">
      <div class="field">
        <label for="ds">Dataset</label>
        <select id="ds"></select>
      </div>
      <div class="field">
        <label for="limit">Limit</label>
        <input id="limit" type="number" min="0" value="3"/>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <label class="check" for="evaluate">
          <input id="evaluate" type="checkbox" checked/>
          Evaluate
        </label>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button id="run-btn" onclick="runDataset()">Run</button>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button id="cancel-btn" onclick="cancelRun()" disabled
                style="background: var(--line-2); color: var(--ink-soft);">Cancel</button>
      </div>
    </section>

    <section class="scorebar" id="scorebar">
      <div class="metric">
        <div class="m-label">Category accuracy</div>
        <div class="m-value" id="m-cat">—</div>
        <div class="m-sub" id="m-cat-sub">0 / 0</div>
      </div>
      <div class="metric">
        <div class="m-label">Priority accuracy</div>
        <div class="m-value" id="m-pri">—</div>
        <div class="m-sub" id="m-pri-sub">0 / 0</div>
      </div>
      <div class="metric">
        <div class="m-label">Response quality (LLM judge)</div>
        <div class="m-value" id="m-resp">—</div>
        <div class="m-sub" id="m-resp-sub">avg over 0</div>
      </div>
    </section>

    <div class="status-bar" id="status-bar">
      <span class="dot"></span>
      <span id="status-text">Ready.</span>
    </div>

    <div class="results" id="results">
      <div class="empty">No results yet. Pick a dataset and hit <strong>Run</strong>.</div>
    </div>
  </div>

<script>
let abortCtrl = null;

async function loadDatasets() {
  const r = await fetch('/datasets');
  const { datasets } = await r.json();
  const sel = document.getElementById('ds');
  sel.innerHTML = datasets.map(d =>
    `<option value="${d.path}">${d.name}  (${d.size.toLocaleString()} bytes)</option>`
  ).join('');
}

function setStatus(text, state /* "" | "running" | "done" | "error" */) {
  const bar = document.getElementById('status-bar');
  const txt = document.getElementById('status-text');
  bar.className = 'status-bar' + (state ? ' ' + state : '');
  txt.textContent = text;
}

function clearResults() {
  document.getElementById('results').innerHTML = '';
}

function escapeHtml(s) {
  return (s ?? '').toString()
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function fmtElapsed(ms) {
  if (ms < 1000) return ms + ' ms';
  return (ms / 1000).toFixed(2) + ' s';
}

function flagsHtml(flags) {
  if (!flags || !flags.length) return '';
  return `<div class="flags">${flags.map(f => `<span class="flag">${escapeHtml(f)}</span>`).join('')}</div>`;
}

function markHtml(correct) {
  if (correct === true)  return '<span class="mark ok" title="matches expected">✓</span>';
  if (correct === false) return '<span class="mark bad" title="does not match expected">✗</span>';
  return '';
}

function judgeBadgeHtml(score, reason) {
  if (score === undefined || score === null) return '';
  const cls = score >= 0.7 ? 'good' : (score >= 0.4 ? 'ok' : 'bad');
  const tip = reason ? ` title="${escapeHtml(reason)}"` : '';
  return `<span class="judge ${cls}"${tip}>judge ${score.toFixed(2)}</span>`;
}

function scoreClass(v, goodAt, okAt) {
  if (v == null) return '';
  return v >= goodAt ? 'good' : (v >= okAt ? 'ok' : 'bad');
}

function showScorebar(on) {
  document.getElementById('scorebar').classList.toggle('on', !!on);
}

function updateScorebar(running) {
  if (!running) return;
  const fmtPct = v => v == null ? '—' : (v * 100).toFixed(1) + '%';
  const fmtScore = v => v == null ? '—' : v.toFixed(2);

  const cat = running.category_accuracy;
  const pri = running.priority_accuracy;
  const rsp = running.response_score_avg;

  const mCat = document.getElementById('m-cat');
  const mPri = document.getElementById('m-pri');
  const mRsp = document.getElementById('m-resp');
  mCat.textContent = fmtPct(cat);
  mPri.textContent = fmtPct(pri);
  mRsp.textContent = fmtScore(rsp);
  mCat.className = 'm-value ' + scoreClass(cat, 0.8, 0.5);
  mPri.className = 'm-value ' + scoreClass(pri, 0.8, 0.5);
  mRsp.className = 'm-value ' + scoreClass(rsp, 0.7, 0.4);

  const nCat = running.category_accuracy_n ?? 0;
  const nPri = running.priority_accuracy_n ?? 0;
  const nRsp = running.response_score_n ?? 0;
  const okCat = Math.round((cat ?? 0) * nCat);
  const okPri = Math.round((pri ?? 0) * nPri);
  document.getElementById('m-cat-sub').textContent = `${okCat} / ${nCat}`;
  document.getElementById('m-pri-sub').textContent = `${okPri} / ${nPri}`;
  document.getElementById('m-resp-sub').textContent = `avg over ${nRsp}`;
}

function retrievedChunks(retrieved) {
  if (!retrieved || !retrieved.length) return '<em>(none)</em>';
  return `<div class="chunks">${retrieved.map(r => `
    <details class="chunk">
      <summary>
        <span class="c-id">${escapeHtml(r.ticket_id)}</span>
        <span class="c-cat">${escapeHtml(r.category)}</span>
        <span class="c-pri">${escapeHtml(r.priority)}</span>
        <span class="c-subject">${escapeHtml(r.subject)}</span>
        <span class="c-score">${(r.score ?? 0).toFixed(3)}</span>
      </summary>
      <div class="chunk-body">
        <div class="c-subject-full">${escapeHtml(r.subject)}</div>
        <div class="c-label">Body</div>
        <div class="c-text">${escapeHtml(r.body || '(empty)')}</div>
        <div class="c-label">Resolution</div>
        <div class="c-text">${escapeHtml(r.resolution || '(empty)')}</div>
      </div>
    </details>`).join('')}</div>`;
}

function renderResultCard(evt) {
  const t = evt.ticket || {};
  const r = evt.result || {};
  const ev = r.evaluation || null;
  const who = [t.customer_name, t.plan].filter(Boolean).join(' · ');
  const conf = (r.confidence ?? 0).toFixed(2);
  const cConf = (r.classification_confidence ?? 0).toFixed(2);

  const catMark = ev ? markHtml(ev.category_correct) : '';
  const priMark = ev ? markHtml(ev.priority_correct) : '';
  const judgeBadge = ev ? judgeBadgeHtml(ev.response_score, ev.response_score_reason) : '';

  const evalRows = ev ? `
        <div class="kv"><span class="k">expected_category</span>       <span class="v">${escapeHtml(ev.expected_category ?? '—')} ${ev.category_correct === false ? `<span class="mark bad">✗</span>` : ''}</span></div>
        <div class="kv"><span class="k">expected_priority</span>       <span class="v">${escapeHtml(ev.expected_priority ?? '—')} ${ev.priority_correct === false ? `<span class="mark bad">✗</span>` : ''}</span></div>
        <div class="kv"><span class="k">judge score</span>             <span class="v">${ev.response_score == null ? '—' : ev.response_score.toFixed(2)}</span></div>
        <div class="kv"><span class="k">judge reason</span>             <span class="v">${escapeHtml(ev.response_score_reason || '—')}</span></div>` : '';

  const card = document.createElement('article');
  card.className = 'card';
  card.innerHTML = `
    <header class="card-head">
      <div class="card-id">
        <span class="id">${escapeHtml(t.ticket_id)}</span>
        ${who ? `<span class="who">· ${escapeHtml(who)}</span>` : ''}
      </div>
      <div class="card-meta">
        <span class="pill" data-cat="${escapeHtml(r.category)}">${escapeHtml(r.category)}${catMark}</span>
        <span class="pill" data-pri="${escapeHtml(r.priority)}">${escapeHtml(r.priority)}${priMark}</span>
        <span class="pill" data-mode="${escapeHtml(r.response_mode)}">${escapeHtml(r.response_mode || '—')}</span>
        ${judgeBadge}
        <span class="elapsed">⏱ ${fmtElapsed(evt.elapsed_ms)}</span>
      </div>
    </header>

    <div class="email">
      <div class="email-block">
        <div class="email-label">Customer message</div>
        <div class="email-subject">${escapeHtml(t.subject)}</div>
        <div class="email-body">${escapeHtml(t.body)}</div>
      </div>
      <div class="email-block response">
        <div class="email-label">
          AI reply
          <span class="conf">confidence ${conf}</span>
        </div>
        <div class="email-body">${escapeHtml(r.response)}</div>
        ${flagsHtml(r.flags)}
      </div>
    </div>

    <details class="internals">
      <summary>Show internals</summary>
      <div class="internals-body">
        <div class="kv"><span class="k">response_mode</span>           <span class="v">${escapeHtml(r.response_mode)}</span></div>
        <div class="kv"><span class="k">response confidence</span>     <span class="v">${conf}</span></div>
        <div class="kv"><span class="k">classification_confidence</span><span class="v">${cConf}</span></div>
        <div class="kv"><span class="k">flags</span>                   <span class="v mono">${escapeHtml((r.flags||[]).join(', ') || '—')}</span></div>
        <div class="kv"><span class="k">retrieval_query</span>         <span class="v mono">${escapeHtml(r.retrieval_query || '—')}</span></div>
        ${evalRows}
        <div class="kv"><span class="k">retrieved (top ${(r.retrieved||[]).length})</span><span class="v">${retrievedChunks(r.retrieved)}</span></div>
      </div>
    </details>
  `;
  document.getElementById('results').appendChild(card);
}

function renderErrorCard(evt) {
  const t = evt.ticket || {};
  const card = document.createElement('article');
  card.className = 'card error';
  card.innerHTML = `
    <header class="card-head">
      <div class="card-id">
        <span class="id">${escapeHtml(t.ticket_id || '?')}</span>
      </div>
      <div class="card-meta">
        <span class="pill" data-mode="no_relevant_answer">error</span>
        <span class="elapsed">⏱ ${fmtElapsed(evt.elapsed_ms || 0)}</span>
      </div>
    </header>
    <div class="email">
      <div class="email-block">
        <div class="email-label">Pipeline error</div>
        <div class="email-body">${escapeHtml(evt.error)}</div>
      </div>
      ${t.subject ? `<div class="email-block">
        <div class="email-label">Customer message</div>
        <div class="email-subject">${escapeHtml(t.subject)}</div>
        <div class="email-body">${escapeHtml(t.body)}</div>
      </div>` : ''}
    </div>
  `;
  document.getElementById('results').appendChild(card);
}

async function runDataset() {
  const path = document.getElementById('ds').value;
  const limit = parseInt(document.getElementById('limit').value || '0', 10);
  const evaluate = document.getElementById('evaluate').checked;
  const runBtn = document.getElementById('run-btn');
  const cancelBtn = document.getElementById('cancel-btn');

  clearResults();
  showScorebar(false);
  runBtn.disabled = true;
  cancelBtn.disabled = false;
  setStatus('Connecting…', 'running');

  abortCtrl = new AbortController();
  const tStart = performance.now();
  let total = 0, done = 0;

  try {
    const resp = await fetch('/run_stream', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ path, limit, evaluate }),
      signal: abortCtrl.signal,
    });
    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error('HTTP ' + resp.status + ': ' + txt.slice(0, 400));
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done: streamDone } = await reader.read();
      if (streamDone) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        let evt;
        try { evt = JSON.parse(line); } catch { continue; }
        if (evt.event === 'start') {
          total = evt.count;
          showScorebar(evt.evaluate);
          let msg = `Running on ${total} ticket${total===1?'':'s'}…`;
          if (evt.evaluate_requested && !evt.evaluate) {
            msg += ' (no expected labels in this dataset — eval disabled)';
          }
          setStatus(msg, 'running');
        } else if (evt.event === 'result') {
          done++;
          renderResultCard(evt);
          if (evt.running) updateScorebar(evt.running);
          setStatus(`${done} / ${total} done · ${((performance.now()-tStart)/1000).toFixed(1)}s`, 'running');
        } else if (evt.event === 'error') {
          done++;
          renderErrorCard(evt);
          setStatus(`${done} / ${total} done (with errors)`, 'running');
        } else if (evt.event === 'done') {
          if (evt.summary) updateScorebar(evt.summary);
          const secs = ((performance.now()-tStart)/1000).toFixed(1);
          let msg = `Finished ${done} / ${total} in ${secs}s`;
          const out = evt.output || {};
          const parts = [];
          if (out.eval_results) {
            const name = out.eval_results.split('/').pop();
            parts.push(`<a href="/outputs/${name}" target="_blank">eval_results.json</a>`);
          }
          if (out.error_analysis) {
            const name = out.error_analysis.split('/').pop();
            parts.push(`<a href="/outputs/${name}" target="_blank">error_analysis.json</a>`);
          }
          if (parts.length) msg += ` · saved ${parts.join(' · ')}`;
          const txt = document.getElementById('status-text');
          document.getElementById('status-bar').className = 'status-bar done';
          txt.innerHTML = msg;
        }
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      setStatus(`Cancelled after ${done} / ${total}`, '');
    } else {
      setStatus('Error: ' + err.message, 'error');
    }
  } finally {
    runBtn.disabled = false;
    cancelBtn.disabled = true;
    abortCtrl = null;
  }
}

function cancelRun() {
  if (abortCtrl) abortCtrl.abort();
}

loadDatasets();
</script>
</body>
</html>
